[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.9.0"
  NPM_VERSION = "10.2.4"
   GO_VERSION = "none" 

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
