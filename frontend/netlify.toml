[build]
  command = "npm run build"
  publish = "dist"
  base = "/"  # Ensure the correct base directory is set
  environment = { NODE_VERSION = "20.9.0", NPM_VERSION = "10.2.4", GO_VERSION = "none" }

[build.environment]
  NODE_VERSION = "20.9.0"
  NPM_VERSION = "10.2.4"
  GO_VERSION = "none"  # Explicitly disable Go

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
